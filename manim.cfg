[CLI]
# Output settings
output_file = BinaryToText
media_dir = ./media
video_dir = {media_dir}/videos/{module_name}/{quality}
images_dir = {media_dir}/images/{module_name}
text_dir = {media_dir}/texts
tex_dir = {media_dir}/Tex
log_dir = {media_dir}/logs

# Performance settings
flush_cache = True
disable_caching = True

# Quality settings
pixel_height = 1080
pixel_width = 1920
frame_rate = 60

# Rendering settings
background_color = BLACK

# GPU Rendering settings for AMD cards
[renderer]
enable_wireframe = False
enable_caching = False

# OpenGL renderer settings (for --renderer=opengl)
[opengl]
write_to_movie = True
